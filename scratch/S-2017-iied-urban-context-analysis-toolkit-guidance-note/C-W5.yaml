internal_tension:
  id: S-2017-iied-urban-context-analysis-toolkit-guidance-note-TNS-001
  first_position: "ASM-002 assumes representative sampling is achievable through deliberate design and team composition (pp. 25-27)"
  conflicting_position: "RISK-001 identifies reliance on powerholders as a structural bias risk that deliberate design may not fully overcome (p. 27)"
  tension_type: methodological
  why_it_matters: If the assumption holds, the toolkit's guidance on deliberate sampling is sufficient mitigation; if RISK-001 dominates, the toolkit overstates its ability to produce representative data in access-constrained urban settings. This tension is not resolved in the source — it is an honest limitation.
  related_objects:
    - S-2017-iied-urban-context-analysis-toolkit-guidance-note-ASM-002
    - S-2017-iied-urban-context-analysis-toolkit-guidance-note-RISK-001
