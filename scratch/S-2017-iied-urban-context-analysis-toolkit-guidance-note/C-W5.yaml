safeguards:

  - object_id: S-2017-iied-urban-context-analysis-toolkit-guidance-note-SAFE-001
    object_name: Data collection protection protocol
    source_location: "p. 28 'Protection considerations and data collection'; p. 26 training guidance step 4 (protection discussion before fieldwork); p. 27 informed consent statement reference"
    source_fidelity_note: Directly specified — "Notes should include general references to the type of interview and location but should be careful not to include identifiable information"; "notes should be stored in a secure way so that access is limited to only a few persons"; "notes can be destroyed after the analysis has been completed"
    risk_addressed:
      - S-2017-iied-urban-context-analysis-toolkit-guidance-note-RISK-002  # protection risk from data collection exposure
    safeguard_action: Apply four-component data protection protocol throughout data collection and analysis — (1) Informed consent statement before each KII/FGD; (2) Notes record only general interview type and location, no identifiable information; (3) Notes stored securely with access limited to a few persons; (4) Notes destroyed after analysis completes unless retention budget and anonymization plan are in place.
    timing:
      - before: Discuss protection risks with all team members including translators during training/orientation; agree on referral and reporting protocols for sensitive topics (GBV, child exploitation)
      - during: Apply informed consent at start of each interview; record without identifying information
      - after: Destroy notes after findings consolidated unless retention is specifically planned and resourced
    required_conditions: Team training on protection risks must occur before data collection; informed consent language must be included in question guides (Tools 5A-5G); a designated data custodian with authority to limit access must be identified
    limits: Does not fully prevent participant harm in very high-risk contexts where even anonymized data could enable identification; does not address risks from external partner data sharing; effectiveness depends on team member discretion
    knowledge_layer: operational
    comparison_notes: Compare with ICRC (2013) Professional Standards for Protection Work and Responsible Data Forum guidance on humanitarian data security; the protocol described here is less detailed than ICRC standards.

  - object_id: S-2017-iied-urban-context-analysis-toolkit-guidance-note-SAFE-002
    object_name: Culturally-matched team composition for community access and protection
    source_location: "p. 13 Table 1 team roles — 'It is essential to recruit interviewers/facilitators who are from the country/city/same groups as the participants'; p. 28 Dar es Salaam case lesson on identity masking"
    source_fidelity_note: Directly stated as essential requirement for team composition — not optional; case lesson from Dar es Salaam reinforces the operational necessity
    risk_addressed:
      - S-2017-iied-urban-context-analysis-toolkit-guidance-note-RISK-001  # sampling bias from powerholder dependence
      - S-2017-iied-urban-context-analysis-toolkit-guidance-note-RISK-002  # protection risk from data collection
    safeguard_action: Recruit data collection team members (interviewers and facilitators) from the same community, ethnic, gender, and displacement-status groups as the participants being interviewed; this provides language competency, navigates identity-masking dynamics, and builds participant trust enabling more complete and accurate data.
    timing: Before data collection — resolved during team composition step (Step 1) before fieldwork begins; cannot be retrofitted mid-collection
    required_conditions: Sufficient lead time to identify and onboard culturally-matched team members; security clearance for team members from at-risk communities; budget for national staff or community interpreters trained in qualitative methods (not just translation)
    limits: May not be fully achievable for all target population sub-groups (especially highly dispersed minorities or newly arrived displaced groups with no established community members available); team member from same community may also face safety risks
    knowledge_layer: operational
    comparison_notes: Team composition as a protection safeguard is consistent with UNHCR urban refugee programming guidance; relates to IRC (2016) Social Network Analysis Handbook on accessing community networks.

