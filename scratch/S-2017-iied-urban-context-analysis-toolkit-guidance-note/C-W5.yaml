risks:

  - object_id: S-2017-iied-urban-context-analysis-toolkit-guidance-note-RISK-001
    object_name: Sampling bias from key powerholder dependence
    source_location: "p. 27 — Step 6 'Continually review and assess participation'; p. 25 sampling guidance"
    source_fidelity_note: Direct statement — "relying on key powerholders to organise participation may introduce bias"; explicitly named as challenge to appropriate participation
    failure_mode: Systematic exclusion of marginalized and minority groups from KII/FGD data because teams rely on community gatekeepers who select participants from dominant networks
    causes:
      - Time pressure pushes teams toward easily-accessible participant channels
      - Community leaders and gatekeepers are used as entry points for organizing FGDs
      - Limited local knowledge prevents teams from identifying alternative, non-gatekeeper routes to marginalized groups
      - Snowball sampling from initial contacts reinforces existing network biases
    consequences:
      - Analysis reflects dominant-group perspectives rather than full community picture
      - Marginalized populations' needs, vulnerabilities, and risks are systematically underrepresented
      - Programme design calibrated to the wrong target population
      - Protection risks for under-served groups are not identified
    warning_signs:
      - FGD/KII participant profiles are uniformly from similar social backgrounds
      - Community leaders are selecting and assembling participants rather than team conducting independent outreach
      - Women, ethnic minorities, youth, or displaced group representatives are absent from data collection
      - Desk review and fieldwork findings show no divergence (suggesting limited diversity of perspectives)
    related_objects:
      - S-2017-iied-urban-context-analysis-toolkit-guidance-note-RULE-001  # separate FGDs by gender/age
      - S-2017-iied-urban-context-analysis-toolkit-guidance-note-IMPL-002  # sub-area selection
      - S-2017-iied-urban-context-analysis-toolkit-guidance-note-METHOD-003  # KII
      - S-2017-iied-urban-context-analysis-toolkit-guidance-note-METHOD-004  # FGD
      - S-2017-iied-urban-context-analysis-toolkit-guidance-note-SAFE-002  # mitigation
    knowledge_layer: diagnostic
    human_review_required: false
    comparison_notes: Sampling bias in urban contexts may be more acute than rural settings due to higher population heterogeneity and fragmentation of community authority structures; compare with Parker & Maynard 2015 and Twigg 2009 on community representation challenges in urban DRR.

  - object_id: S-2017-iied-urban-context-analysis-toolkit-guidance-note-RISK-002
    object_name: Protection risk from data collection exposure of displaced populations
    source_location: "p. 26 tip 'Working with displaced populations'; p. 28 'Protection considerations and data collection'; p. 28 Dar es Salaam case box"
    source_fidelity_note: Directly stated — "Many displaced populations, especially refugees living in urban areas, attempt to mask their identity to avoid exposure to risk or discrimination based on their identity"; Dar es Salaam case illustrates deportation risk triggering identity concealment
    failure_mode: Data collection activities inadvertently expose displaced persons to harm — deportation, discrimination, or violence — by revealing their identity, nationality, or location to authorities or hostile actors
    causes:
      - Notes contain identifiable information (names, specific locations, nationality)
      - Informed consent process does not adequately explain data use and protection
      - External dissemination of findings without proper anonymization
      - Interviewing populations in contexts where their legal status is insecure
      - Team composition not reflecting community trust dynamics
    consequences:
      - Participants face deportation, detention, or discrimination
      - Communities become inaccessible for future humanitarian analysis and programming
      - Organizational reputational harm and potential legal exposure
      - Chilling effect on future participation in humanitarian assessments
    warning_signs:
      - Participants declining to disclose nationality or legal status
      - Visible nervousness, deflection, or inconsistency in responses
      - Context involves documented deportation risk, documented cases of identity-based discrimination
      - Absence of community trust-builders on data collection team
    related_objects:
      - S-2017-iied-urban-context-analysis-toolkit-guidance-note-RULE-005  # data protection
      - S-2017-iied-urban-context-analysis-toolkit-guidance-note-SAFE-001  # data collection protection protocol
      - S-2017-iied-urban-context-analysis-toolkit-guidance-note-SAFE-002  # team composition
      - S-2017-iied-urban-context-analysis-toolkit-guidance-note-LESSON-002  # Dar es Salaam identity masking
    knowledge_layer: diagnostic
    human_review_required: false
    comparison_notes: Urban displacement contexts present qualitatively different identity-exposure risks than camp settings — no registration list, dispersed across host community, often with irregular status; compare with Sphere and UNHCR urban refugee guidance on data protection.

  - object_id: S-2017-iied-urban-context-analysis-toolkit-guidance-note-RISK-003
    object_name: Partner bias in joint context analysis
    source_location: "p. 14 'Joint analysis and partnerships' — 'Organisations should be careful about taking on new partners'; p. 28 protection considerations re: sharing findings"
    source_fidelity_note: Directly warned — "Are there any risks of bias of the potential partner participating in data collection that cannot be mitigated through the overall team composition?"; protection risk of sharing findings with partners also identified
    failure_mode: Local partner participation in joint analysis introduces systematic bias in data collection or interpretation that undermines analysis quality or compromises confidentiality
    causes:
      - Partner organisations have pre-existing relationships, interests, or community alignments affecting neutrality
      - Partner staff may be known to communities in ways that cause participants to self-censor
      - Partners may have incentives to emphasize or suppress certain findings
      - Joint analysis design lacks conflict-of-interest protocols
    consequences:
      - Skewed analysis that reflects partner interests rather than objective context
      - Confidentiality breaches if partners share sensitive findings with communities or authorities
      - Implementation tensions or coordination failures if analysis quality is compromised
      - Communities and respondents distrust future joint efforts
    warning_signs:
      - Partner staff are well-known members of communities being assessed
      - Partner has organizational mandate overlapping with analysis findings
      - Partner is under pressure from local government or community leaders
      - No bias mitigation protocol established before analysis begins
    related_objects:
      - S-2017-iied-urban-context-analysis-toolkit-guidance-note-RULE-003  # restrict partners when conflict/protection dynamics
      - S-2017-iied-urban-context-analysis-toolkit-guidance-note-IMPL-003  # joint analysis design
    knowledge_layer: diagnostic
    human_review_required: false
    comparison_notes: Compare with IRC conflict sensitivity toolkit guidance on managing partner bias in conflict-affected contexts; also relevant to Mohiddin et al. 2017 URAF guidance on coordination in urban response.

  - object_id: S-2017-iied-urban-context-analysis-toolkit-guidance-note-RISK-004
    object_name: Context analysis staleness in dynamic urban crisis
    source_location: "p. 33 'When to update your context analysis'; p. 10 Limitations — 'users should revise the analysis as necessary'"
    source_fidelity_note: Directly stated — "it is probably useful to re-assess the validity before using the assessment for programming assumptions if it is more than 6-9 months old"; "Urban environments are constantly changing"
    failure_mode: Context analysis findings are used for programme design after the urban context has materially changed, producing programming assumptions based on invalid or outdated information
    causes:
      - Urban displacement contexts change more rapidly than rural settings (government changes, policy shifts, displacement flows)
      - Resource constraints delay reassessment; organizations assume previous analysis remains valid
      - No formal trigger mechanism for reassessment built into programme cycle
      - Single analysis at start of programme cycle treated as durable throughout multi-year programme
    consequences:
      - Programme design based on outdated actor mappings, power dynamics, or service delivery landscape
      - Interventions reinforce expired conditions or miss new risks
      - Coordination strategies built around actors who have lost influence or left
      - Protection analysis outdated relative to current threats
    warning_signs:
      - More than 6-9 months since last context analysis completed
      - Significant political event occurred (election, government change, policy shift)
      - Major displacement event or return movement since last analysis
      - Crisis escalation or de-escalation changing dynamics
    related_objects:
      - S-2017-iied-urban-context-analysis-toolkit-guidance-note-RULE-002  # reassessment threshold
      - S-2017-iied-urban-context-analysis-toolkit-guidance-note-METHOD-001  # context analysis process
    knowledge_layer: diagnostic
    human_review_required: false
    comparison_notes: The 6-9 month threshold is asserted without supporting evidence from the pilots — it should be treated as a practitioner rule of thumb; may be shorter in rapidly-changing conflict contexts. Compare with ALNAP urban response guidance on assessment frequency.

