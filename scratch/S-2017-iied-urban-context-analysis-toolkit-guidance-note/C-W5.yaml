assumptions:

  - object_id: S-2017-iied-urban-context-analysis-toolkit-guidance-note-ASM-001
    object_name: Established country presence and 2-week data collection baseline
    assumption: The toolkit is designed for use by organisations already operating in the city or country for at least several months prior to the analysis, and assumes approximately two weeks of in-country data collection as a baseline starting point.
    explicit_or_inferred: explicit
    where_it_appears: "p. 9 'When to use the toolkit' — 'The toolkit itself is generally designed with the assumption of approximately two weeks in country of data collection as a starting point' and 'The assumption made while developing the toolkit was that the organisation using it will already have been operating in the city/country for at least several months prior to the analysis'; p. 12 Tool 1 workplan (14-day illustrative plan)"
    why_it_matters: Significantly limits applicability for emergency-response organisations entering a context for the first time; also limits use for rapid-response scenarios where 2 weeks of in-country data collection is unavailable. Footnote 3 points to alternative tools (GECARR, IRC conflict sensitivity toolkit) for rapid-response contexts.
    related_objects:
      - S-2017-iied-urban-context-analysis-toolkit-guidance-note-METHOD-001  # context analysis process
      - S-2017-iied-urban-context-analysis-toolkit-guidance-note-TOOL-001  # workplan

  - object_id: S-2017-iied-urban-context-analysis-toolkit-guidance-note-ASM-002
    object_name: Representative sampling achievable through deliberate design
    assumption: Adequate diversity of participants — including women, marginalized groups, ethnic minorities, and displaced populations — can be achieved through deliberate sampling design and team composition, even in urban humanitarian contexts.
    explicit_or_inferred: inferred
    where_it_appears: "p. 25 'Ensuring representation of full community' tip; p. 25 FGD planning guidance; p. 26-27 Step 6 participation monitoring guidance; p. 32 validation workshop gender considerations"
    why_it_matters: May not hold in high-insecurity contexts where certain groups genuinely cannot be reached safely; in highly fragmented urban crises, deliberate design alone may not overcome structural access barriers for most marginalized groups. The assumption creates potential overconfidence in analysis representativeness.
    related_objects:
      - S-2017-iied-urban-context-analysis-toolkit-guidance-note-RISK-001  # sampling bias
      - S-2017-iied-urban-context-analysis-toolkit-guidance-note-METHOD-003  # KII
      - S-2017-iied-urban-context-analysis-toolkit-guidance-note-METHOD-004  # FGD
    tension_note: Conflicts with RISK-001 (sampling bias) — the assumption that representation is achievable is in tension with the acknowledged risk that powerholders controlling access introduce bias. See TNS-001.

  - object_id: S-2017-iied-urban-context-analysis-toolkit-guidance-note-ASM-003
    object_name: Final report is optional — validation workshop outputs may suffice
    assumption: A final written report is not a mandatory output of the urban context analysis; the outputs of the validation workshop alone may be sufficient to complete the process.
    explicit_or_inferred: explicit
    where_it_appears: "p. 32 Step 9 — 'a final report is not a requirement and the outputs of the validation workshop may be enough for completion of the context analysis'"
    why_it_matters: Creates risk that institutional knowledge from context analysis is not captured in a durable, transferable format; workshop outputs are typically not preserved or accessible to future staff, partner organisations, or HQ. Ambiguity around what constitutes "completion" may lead to premature closure before findings are adequately documented.
    related_objects:
      - S-2017-iied-urban-context-analysis-toolkit-guidance-note-METHOD-006  # validation workshop
      - S-2017-iied-urban-context-analysis-toolkit-guidance-note-IMPL-006  # findings communication

