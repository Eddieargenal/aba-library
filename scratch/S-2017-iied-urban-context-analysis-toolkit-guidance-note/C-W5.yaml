case_lessons:

  - object_id: S-2017-iied-urban-context-analysis-toolkit-guidance-note-LESSON-001
    object_name: "Dar es Salaam 2016: Pre-existing population knowledge enables focused sub-area selection"
    source_location: "p. 16 'Selecting sub-areas for an urban context analysis, Dar es Salaam, 2016' case box"
    source_fidelity_note: Direct case account — IRC pilot in Dar es Salaam 2016; the source explicitly draws the lesson about the value of prior population knowledge
    case_reference: "Dar es Salaam urban context analysis, IRC, 2016"
    situation: IRC intended to target Burundian and Congolese refugees in Dar es Salaam, a large sprawling city. Without targeted sub-area selection, a city-wide approach would have been time-consuming and potentially incomplete.
    lesson: Prior knowledge of where target populations are concentrated within a city is a prerequisite for efficient and complete sub-area selection; without this knowledge, analysis risks covering areas that reveal only an incomplete picture of how the city functions for target groups.
    evidence: IRC focused on three areas known to have higher concentrations of target groups, enabling in-depth inquiry. The source explicitly states that without this prior knowledge, "choosing the relevant areas of the city would have been challenging and might have led to analysis of areas that would only reveal an incomplete picture."
    transferability: High — applies to any large urban context analysis where the implementing organisation intends to target a specific population sub-group that may be concentrated in particular areas of the city. Especially relevant for refugee/IDP contexts where displacement patterns create geographic concentration.
    related_objects:
      - S-2017-iied-urban-context-analysis-toolkit-guidance-note-IMPL-002  # sub-area selection criteria
      - S-2017-iied-urban-context-analysis-toolkit-guidance-note-METHOD-001  # context analysis process
      - S-2017-iied-urban-context-analysis-toolkit-guidance-note-TOOL-003  # stakeholder analysis (informs area selection)
    knowledge_layer: operational
    human_review_required: false
    comparison_notes: Connects to the broader question of how well humanitarian organisations understand urban displacement geography before initiating programming; compare with DFID/IRC/ALNAP 2015 and GSC 2019 guidance on geographic targeting in urban ABA.

  - object_id: S-2017-iied-urban-context-analysis-toolkit-guidance-note-LESSON-002
    object_name: "Dar es Salaam 2016: Identity masking by displaced populations requires culturally-matched team composition"
    source_location: "p. 28 'Protection considerations, Dar es Salaam, 2016' case box"
    source_fidelity_note: Direct case account — IRC pilot in Dar es Salaam 2016; lesson explicitly drawn from the case about the need to anticipate identity-masking
    case_reference: "Dar es Salaam urban context analysis, IRC, 2016 — protection considerations"
    situation: Many Burundian and Congolese displaced/refugees in Dar es Salaam would not admit their nationality for fear of deportation, raising protection concerns in attempting to identify and consult with these groups.
    lesson: Urban displaced populations in legally insecure situations systematically mask identity during data collection; having team members from the same community background is critical for navigating protection concerns and accessing accurate, representative data.
    evidence: "The team was fortunate to have a Congolese person on the data collection team to navigate these concerns." The source identifies this as a lesson — teams should anticipate identity-masking in advance and design team composition accordingly rather than addressing it reactively.
    transferability: High — the identity-masking dynamic is widespread among urban refugees and IDPs whose legal status is insecure. Generalizes beyond Dar es Salaam to any urban context analysis involving undocumented displaced populations or populations with reasons to conceal identity.
    related_objects:
      - S-2017-iied-urban-context-analysis-toolkit-guidance-note-RISK-002  # protection risk from data collection
      - S-2017-iied-urban-context-analysis-toolkit-guidance-note-IMPL-001  # team composition
      - S-2017-iied-urban-context-analysis-toolkit-guidance-note-RULE-005  # data protection
      - S-2017-iied-urban-context-analysis-toolkit-guidance-note-SAFE-002  # culturally-matched team composition
    knowledge_layer: operational
    human_review_required: false
    comparison_notes: Lesson has direct implications for team composition design in urban refugee contexts; relates to broader UNHCR and ICRC literature on humanitarian data collection with populations of concern in urban settings.

  - object_id: S-2017-iied-urban-context-analysis-toolkit-guidance-note-LESSON-003
    object_name: "Maiduguri 2016: External brief enables knowledge transfer without compromising confidential internal report"
    source_location: "p. 33 'Context analysis brief, Maiduguri, 2016' case box"
    source_fidelity_note: Direct case account — IRC Maiduguri context analysis November-December 2016; lesson implicitly drawn through the case example
    case_reference: "Maiduguri urban context analysis, IRC, November-December 2016"
    situation: IRC conducted urban context analysis in Maiduguri, Nigeria. The internal report contained sensitive/confidential information about displacement dynamics and actor analysis not suitable for wide distribution, but there was a need to communicate findings to wider stakeholders in Nigeria who had not participated.
    lesson: Producing a targeted external brief alongside an internal context analysis report enables effective stakeholder knowledge transfer without compromising the confidentiality of sensitive internal findings; the two documents serve different audiences with different disclosure thresholds.
    evidence: "An external brief was written to communicate the findings of the report with other stakeholders in Nigeria that had not partaken in the analysis." The case is presented as a positive practice example in the guidance note.
    transferability: High — the dual-document approach (confidential internal report + non-sensitive external brief) is applicable to any context analysis where findings include politically sensitive actor analysis, protection-sensitive data, or commercially confidential organizational information.
    related_objects:
      - S-2017-iied-urban-context-analysis-toolkit-guidance-note-RULE-012  # internal-only report rule
      - S-2017-iied-urban-context-analysis-toolkit-guidance-note-IMPL-006  # findings communication and dissemination
    knowledge_layer: operational
    human_review_required: false
    comparison_notes: Dual-document practice is widely used in political economy analysis and conflict analysis; this case provides urban humanitarian context for the approach.

