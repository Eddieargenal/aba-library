    buried_decision_logic: false
    cross_section: false
    confidence: high

  - type: method
    description: "Stakeholder analysis / actor mapping method — systematically listing and analyzing influential stakeholders by type, level, role, interests, and relationships for programme partnership and coordination."
    location: "Pages 22-23"
    buried_decision_logic: false
    cross_section: true
    confidence: high

  - type: method
    description: "Key informant interview (KII) method — structured semi-structured interviews at sub-area and city-wide levels, informed by stakeholder analysis to identify positions and individuals."
    location: "Step 5, pages 24-25"
    buried_decision_logic: false
    cross_section: false
    confidence: high

  - type: method
    description: "Focus group discussion (FGD) method — structured group discussions with affected populations, separated by gender/age with same-sex facilitators."
    location: "Step 5, page 25"
    buried_decision_logic: true
    cross_section: false
    confidence: high

  - type: method
    description: "Snowball/referral sampling method — during KIIs and FGDs, continuously solicit referrals for additional key informants to identify otherwise unreachable participants."
    location: "Step 6, page 27"
    buried_decision_logic: false
    cross_section: false
    confidence: high

  - type: method
    description: "Daily debrief method — daily or every-second-day team session to review findings, construct understanding of sub-area dynamics, and refine hypotheses for subsequent data collection."
    location: "Step 6, pages 27-28"
    buried_decision_logic: false
    cross_section: false
    confidence: high

  - type: implementation_logic
    description: "Question guide adaptation and contextualization — 4-step process: (1) eliminate irrelevant questions, (2) add context-specific questions, (3) validate with country staff, (4) discuss protection risks with team before fieldwork."
    location: "Pages 25-26"
    buried_decision_logic: false
    cross_section: false
    confidence: high

  - type: implementation_logic
    description: "Data collection team training and orientation — minimum half to full day covering toolkit purpose, desk review findings, tool review with local language agreement, role-play, and tool piloting in city areas."
    location: "Pages 25-26"
    buried_decision_logic: false
    cross_section: false
    confidence: high

  - type: implementation_logic
    description: "Participatory data collection planning workshop — optional half-day or one-day workshop with local stakeholders (NGOs, government, academics, community leaders) to finalize planning, especially when staff have limited local knowledge or analysis is conducted in partnership."
    location: "Page 25"
    buried_decision_logic: true
    cross_section: false
    confidence: high

  - type: implementation_logic
    description: "Mid-data collection review — scheduled team session after approximately 50% of data collection to assess gaps, adjust sampling, and clean debrief notes before final analysis."
    location: "Step 6, pages 27-28"
    buried_decision_logic: false
    cross_section: false
    confidence: high

  - type: decision_rule
    description: "Plan separate FGDs for men and women / adolescent boys and girls with same-sex facilitators — adolescents are less likely to speak in mixed-gender groups."
    location: "Page 25"
    buried_decision_logic: false
    cross_section: false
    confidence: high

  - type: decision_rule
    description: "If conducting analysis in partnership or staff have limited local community knowledge, conduct an optional participatory data collection planning workshop with local stakeholders."
    location: "Page 25"
    buried_decision_logic: false
    cross_section: false
    confidence: high

  - type: decision_rule
    description: "Desk review should be completed 2-3 weeks before primary data collection to allow enough time to revise the data collection plan (Step 5) based on gaps identified."
    location: "Step 4, page 20"
    buried_decision_logic: false
    cross_section: false
    confidence: high

  - type: decision_rule
    description: "Question guides must always be reviewed and adapted for every context analysis — themes in framework connect to specific questionnaire modules to guide prioritization."
    location: "Pages 25-26"
    buried_decision_logic: false
    cross_section: false
    confidence: high

  - type: decision_rule
    description: "Data collection team lead should review notes regularly to monitor whether team members are correctly asking questions and probing for complete and credible responses."
    location: "Step 6, page 27"
    buried_decision_logic: false
    cross_section: false
    confidence: medium

  - type: decision_rule
    description: "When identifying stakeholders, include 'difficult stakeholders' — those who may block, divert, or capture assistance — as they often control access to key groups and can undermine programme support if not engaged."
    location: "Page 23"
    buried_decision_logic: false
    cross_section: false
    confidence: high

  - type: safeguard
    description: "Protection considerations in data collection — notes should include only general interview type and location references, not identifiable information; informed consent required; secure storage with limited access; notes destroyed after analysis when retention not required."
    location: "Page 28"
    buried_decision_logic: false
    cross_section: false
    confidence: high

  - type: safeguard
    description: "Discuss potential protection risks around sensitive questions (GBV, child exploitation) with all team members including translators, with clear referral and reporting guidance, before data collection begins."
    location: "Page 26"
    buried_decision_logic: false
    cross_section: false
    confidence: high

  - type: safeguard
    description: "Ensure gender diversity in FGD/KII sampling — women and minority social groups must be adequately represented; gender-balanced distribution essential for capturing barriers to service access."
    location: "Page 26"
    buried_decision_logic: false
    cross_section: false
    confidence: high

  - type: risk
    description: "Sampling bias risk — reliance on key powerholders to organize FGD/KII participation introduces bias; teams must proactively monitor for gaps in representation of marginalized and minority groups."
    location: "Step 6, page 27"
    buried_decision_logic: false
    cross_section: false
    confidence: high

  - type: risk
    description: "Identity masking risk — displaced populations (especially urban refugees) may mask nationality or status to avoid deportation, impeding representative data collection."
    location: "Pages 26, 28"
    buried_decision_logic: false
    cross_section: false
    confidence: high

  - type: risk
    description: "Partner bias risk — when sharing findings publicly or involving external partners in joint analysis, risk of exposing participants or losing confidentiality of sensitive findings."
    location: "Page 28"
    buried_decision_logic: false
    cross_section: false
    confidence: high

  - type: case_lesson
    description: "Dar es Salaam 2016: Burundian and Congolese refugees would not admit nationality for fear of deportation — team having a Congolese data collector was critical to navigating protection concerns; lesson: anticipate identity-masking and build culturally-appropriate team composition."
    location: "Page 28"
    buried_decision_logic: false
    cross_section: false
    generalizable: true
    confidence: high

  - type: indicator
    description: "City-level and sub-area KII/FGD completion per thematic framework sub-themes — used in Tool 6 to assess data saturation and identify remaining gaps during mid-collection review."
    location: "Step 6, pages 27-28"
    buried_decision_logic: false
    cross_section: false
    confidence: medium

  - type: assumption
    description: "Analysis assumes that a diversity of perspectives (including women, marginalized groups, difficult stakeholders) can be reached through deliberate sampling — this may not hold in high-insecurity contexts."
    location: "Pages 25-27"
    buried_decision_logic: false
    cross_section: false
    confidence: medium

  - type: assumption
    description: "Thematic framework assumes systems-thinking approach is applicable across urban displacement contexts — cross-cutting themes (gender, do-no-harm) may require more explicit adaptation in specific contexts."
    location: "Table 3, pages 18-19"
    buried_decision_logic: false
    cross_section: true
    confidence: medium
